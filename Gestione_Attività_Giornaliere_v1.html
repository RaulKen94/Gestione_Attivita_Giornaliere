<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestore Attività Giornaliere</title>
    <!-- Inizio: Codice per la Favicon -->
    <!-- Per un file .ico (il più compatibile) -->
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <!-- Per un file .png (opzionale, per browser moderni) -->
    <link rel="icon" href="logo.png" type="image/png">
    <!-- Fine: Codice per la Favicon -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(10px); }
        }
        .animate-fade-in-out {
            animation: fadeInOut 2s ease-in-out forwards;
        }
        .font-inter {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4 font-inter text-gray-800 flex flex-col items-center">
    <h1 class="text-4xl font-bold text-indigo-700 mb-6 text-center">Gestore Attività Giornaliere</h1>
    
    <!-- Sezione Input -->
    <div class="w-full max-w-3xl bg-white rounded-xl shadow-lg p-6 mb-8 border border-indigo-200">
        <label for="activity-input" class="block text-xl font-semibold text-indigo-600 mb-3">
            Incolla le tue attività qui:
        </label>
        <textarea
            id="activity-input"
            class="w-full h-64 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-mono"
            placeholder="Esempio:&#10;Lunedì 22/07&#10;2h [CLIENTE1] CAS-12345-6789 Titolo..."></textarea>
        <button id="process-button" class="mt-4 px-8 py-3 bg-indigo-600 text-white font-bold rounded-lg shadow-md hover:bg-indigo-700 transition block mx-auto">
            Elabora Attività
        </button>
    </div>

    <!-- Calendario e Preview Testuale -->
    <div class="w-full max-w-3xl bg-white rounded-xl shadow-lg p-6 mb-8 border border-indigo-200">
        <div id="calendar-container" class="w-full mb-6">
            <div class="flex justify-between items-center mb-4">
                <button id="prev-month-button" class="p-2 rounded-full hover:bg-gray-100 font-bold">&lt;</button>
                <h4 id="calendar-month-year" class="text-xl font-bold text-indigo-800 uppercase tracking-wide"></h4>
                <button id="next-month-button" class="p-2 rounded-full hover:bg-gray-100 font-bold">&gt;</button>
            </div>
            <div class="grid grid-cols-7 gap-2 text-center text-xs font-bold text-gray-500 mb-2 uppercase">
                <div>Lun</div><div>Mar</div><div>Mer</div><div>Gio</div><div>Ven</div><div>Sab</div><div>Dom</div>
            </div>
            <div id="calendar-days" class="grid grid-cols-7 gap-2"></div>
        </div>

        <div class="relative bg-gray-50 p-4 rounded-lg border border-gray-200">
            <!-- Etichetta con font piccolo come richiesto -->
            <h3 class="text-xs font-bold text-gray-400 mb-2 uppercase">Preview Testuale (Giorno Selezionato)</h3>
            <pre id="displayed-activities-output" class="whitespace-pre-wrap font-mono text-sm text-gray-700"></pre>
            <div class="flex justify-end mt-4">
                <button id="copy-button" class="px-4 py-2 bg-green-600 text-white text-sm font-bold rounded hover:bg-green-700 transition">
                    Copia Tutto
                </button>
            </div>
        </div>
    </div>

    <!-- Sezione Dettaglio Interattiva -->
    <div class="w-full max-w-3xl bg-white rounded-xl shadow-lg p-6 mt-4 border border-indigo-200">
        <h2 id="section4-title" class="text-2xl font-bold text-indigo-700 mb-6 text-center">Dettaglio Attività</h2>
        <div id="section4-output-container" class="space-y-4">
            <p class="text-gray-400 text-center py-10 italic">Seleziona un giorno dal calendario per gestire le singole righe.</p>
        </div>
    </div>

    <script>
        window.parsedActivities = {}; 
        window.selectedDate = ''; 
        window.currentCalendarDisplayDate = new Date();
        window.lastCopiedIndex = null; 

        const italianMonths = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno', 'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];

        function parseInputText(text) {
            const activities = {};
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let currentDate = '';

            lines.forEach((line) => {
                const dayMatch = line.match(/^(?:Luned[iì]|Marted[iì]|Mercoled[iì]|Gioved[iì]|Venerd[iì]|Sabat[oò]|Domenic[aà])\s+(\d{2}\/\d{2})/i);
                if (dayMatch) {
                    currentDate = dayMatch[1];
                    if (!activities[currentDate]) activities[currentDate] = [];
                } else if (currentDate) {
                    const activityMatch = line.match(/^(\d+(?:\.\d+)?h)\s+\[([^\]]+)\]\s*(.*)$/);
                    if (activityMatch) {
                        const client = activityMatch[2];
                        const title = activityMatch[3] || '';
                        const casMatch = title.match(/(CAS-\d{5}-[A-Z0-9]{4})/);
                        let ticket = casMatch ? casMatch[1] : '';

                        if (!ticket && client.toUpperCase() === 'RANDSTAD') {
                            const rMatch = title.match(/\[?(\d+R)\]?$/);
                            if (rMatch) ticket = rMatch[1];
                        }

                        activities[currentDate].push({
                            hours: activityMatch[1],
                            client: client,
                            ticket: ticket,
                            title: title,
                            isManaged: false,
                            originalIndex: activities[currentDate].length + 1
                        });
                    }
                }
            });
            return activities;
        }

        function calculateTotalHours(date) {
            if (!window.parsedActivities[date]) return 0;
            return window.parsedActivities[date].reduce((acc, curr) => acc + parseFloat(curr.hours.replace('h', '')), 0);
        }

        function copyToClipboard(text, idx = null) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            
            if(idx !== null) {
                window.lastCopiedIndex = idx;
                updateSection4();
            }

            const msg = document.createElement('div');
            msg.className = 'fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-2 rounded-full shadow-2xl z-50 animate-fade-in-out font-bold';
            msg.textContent = 'Copiato!';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }

        function renderCalendar() {
            const year = window.currentCalendarDisplayDate.getFullYear();
            const month = window.currentCalendarDisplayDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startOffset = (firstDay === 0 ? 6 : firstDay - 1);

            document.getElementById('calendar-month-year').textContent = `${italianMonths[month]} ${year}`;
            
            let html = '';
            for (let i = 0; i < startOffset; i++) html += '<div></div>';
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${String(d).padStart(2, '0')}/${String(month + 1).padStart(2, '0')}`;
                const hasData = window.parsedActivities[dateStr];
                
                let colorClass = 'bg-white text-gray-300 border-gray-100 cursor-not-allowed';
                if (hasData) {
                    const total = calculateTotalHours(dateStr);
                    colorClass = (total === 8) ? 'bg-green-500 text-white shadow-md' : 'bg-red-500 text-white shadow-md';
                }

                const selected = window.selectedDate === dateStr ? 'ring-4 ring-indigo-600 ring-offset-2 scale-110 z-10' : '';
                
                html += `
                    <button onclick="selectDate('${dateStr}')" 
                        class="h-12 w-full rounded-xl flex items-center justify-center text-sm font-bold border transition-all duration-200 ${colorClass} ${selected}" 
                        ${!hasData ? 'disabled' : ''}>
                        ${d}
                    </button>`;
            }
            document.getElementById('calendar-days').innerHTML = html;
        }

        function selectDate(date) {
            window.selectedDate = date;
            window.lastCopiedIndex = null;
            updateUI();
        }

        function updateSection4() {
            const container = document.getElementById('section4-output-container');
            container.innerHTML = '';
            
            if (!window.selectedDate || !window.parsedActivities[window.selectedDate]) return;

            const list = [...window.parsedActivities[window.selectedDate]].sort((a, b) => {
                if (a.isManaged === b.isManaged) return a.originalIndex - b.originalIndex;
                return a.isManaged ? 1 : -1;
            });

            list.forEach((act) => {
                const lineText = `${act.client.toUpperCase()};${act.hours.replace('h','')};${act.ticket};`;
                
                const row = document.createElement('div');
                row.className = `flex items-center p-6 rounded-2xl border transition-all duration-300 transform ${act.isManaged ? 'bg-gray-50 border-gray-200 opacity-60' : (window.lastCopiedIndex === act.originalIndex ? 'bg-blue-50 border-blue-400 shadow-md scale-[1.01]' : 'bg-white border-gray-200 shadow-sm hover:border-indigo-300 hover:shadow-md')}`;

                row.innerHTML = `
                    <div class="flex-shrink-0 w-11 h-11 rounded-full flex items-center justify-center text-base font-black mr-5 shadow-sm ${act.isManaged ? 'bg-gray-300 text-white' : 'bg-indigo-600 text-white'}">
                        ${act.originalIndex}
                    </div>
                    <div class="flex-grow font-mono text-lg font-semibold truncate pr-6 ${act.isManaged ? 'line-through text-gray-400' : 'text-gray-800'}">
                        ${lineText}
                    </div>
                    <div class="flex gap-4">
                        <button onclick="copyToClipboard('${lineText}', ${act.originalIndex})" class="px-5 py-3.5 bg-green-600 text-white text-sm font-bold rounded-2xl hover:bg-green-700 hover:shadow-lg transform transition active:scale-95 hover:-translate-y-0.5">Copia</button>
                        ${act.ticket ? `<button onclick="copyToClipboard('${act.ticket}', ${act.originalIndex})" class="px-5 py-3.5 bg-blue-600 text-white text-sm font-bold rounded-2xl hover:bg-blue-700 hover:shadow-lg transform transition active:scale-95 hover:-translate-y-0.5">Ticket</button>` : ''}
                        <button onclick="toggleManaged(${act.originalIndex})" class="px-5 py-3.5 ${act.isManaged ? 'bg-gray-400' : 'bg-orange-500'} text-white text-sm font-bold rounded-2xl hover:opacity-90 hover:shadow-lg transform transition active:scale-95 hover:-translate-y-0.5">
                            ${act.isManaged ? 'Annulla' : 'Gestito'}
                        </button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        window.toggleManaged = (idx) => {
            const act = window.parsedActivities[window.selectedDate].find(a => a.originalIndex === idx);
            if (act) act.isManaged = !act.isManaged;
            updateSection4();
        };

        function updateUI() {
            renderCalendar();
            updateSection4();
            
            const out = document.getElementById('displayed-activities-output');
            const title = document.getElementById('section4-title');

            if (window.selectedDate && window.parsedActivities[window.selectedDate]) {
                const data = window.parsedActivities[window.selectedDate];
                const grouped = {};
                data.forEach(a => {
                    const ck = a.client.toUpperCase();
                    if (!grouped[ck]) grouped[ck] = [];
                    grouped[ck].push(a);
                });

                let formatted = [];
                Object.keys(grouped).sort().forEach(ck => {
                    formatted.push(`--- ${ck} ---`);
                    grouped[ck].forEach(a => formatted.push(`${a.hours} [${a.client}]${a.ticket ? ' ' + a.ticket : ''} ${a.title}`));
                    formatted.push('');
                });
                out.textContent = formatted.join('\n').trim();
                title.textContent = `Dettaglio - ${window.selectedDate}`;
            } else {
                out.textContent = 'Elabora il testo e seleziona un giorno...';
                title.textContent = 'Dettaglio Attività';
            }
        }

        document.getElementById('process-button').onclick = () => {
            window.parsedActivities = parseInputText(document.getElementById('activity-input').value);
            const dates = Object.keys(window.parsedActivities);
            if (dates.length > 0) selectDate(dates[0]);
            else updateUI();
        };

        document.getElementById('prev-month-button').onclick = () => {
            window.currentCalendarDisplayDate.setMonth(window.currentCalendarDisplayDate.getMonth() - 1);
            updateUI();
        };

        document.getElementById('next-month-button').onclick = () => {
            window.currentCalendarDisplayDate.setMonth(window.currentCalendarDisplayDate.getMonth() + 1);
            updateUI();
        };

        document.getElementById('copy-button').onclick = () => {
            copyToClipboard(document.getElementById('displayed-activities-output').textContent);
        };

        updateUI();
    </script>
</body>
</html>
